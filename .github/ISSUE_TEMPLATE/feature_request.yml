name: Запрос функции
description: Предложите сфокусированное улучшение.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Проблема
      description: Какую операторскую проблему это должно решить?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Предложение
      description: Опишите минимальное полезное изменение.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Проверка scope
      options:
        - label: Это сохраняет проект Keenetic-only.
          required: true
        - label: Это не требует web UI или daemon.
          required: true
        - label: Это сохраняет managed-only обновления роутеров.
          required: true
