name: Feature request
description: Propose a focused improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the project Keenetic-only.
          required: true
        - label: This does not require a web UI or daemon.
          required: true
        - label: This preserves managed-only router updates.
          required: true
