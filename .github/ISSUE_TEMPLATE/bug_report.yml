name: Bug report
description: Report a reproducible problem in FQDN-updater.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real router credentials, `.env` values, or private KeenDNS hostnames.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        Docker:
        FQDN-updater version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or artifacts
      description: Paste only redacted logs or artifact excerpts.
      render: text
