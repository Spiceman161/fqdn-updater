name: Отчёт об ошибке
description: Сообщите о воспроизводимой проблеме в FQDN-updater.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Не добавляйте реальные пароли роутеров, значения `.env` или приватные KeenDNS hostnames.
  - type: textarea
    id: summary
    attributes:
      label: Краткое описание
      description: Что пошло не так?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Минимальные шаги, которые воспроизводят проблему.
      placeholder: |
        1. Запустить ...
        2. Настроить ...
        3. Увидеть ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Окружение
      placeholder: |
        OS:
        Python:
        Docker:
        Версия FQDN-updater:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Логи или artifacts
      description: Вставляйте только отредактированные логи или фрагменты artifacts без секретов.
      render: text
